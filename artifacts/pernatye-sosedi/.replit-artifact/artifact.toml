kind = "mobile"
previewPath = "/"
title = "Пернатые соседи"
version = "1.0.0"
id = "artifacts/pernatye-sosedi"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21363

[services.development]
run = "pnpm --filter @workspace/pernatye-sosedi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pernatye-sosedi", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pernatye-sosedi", "run", "serve" ]

[services.env]
PORT = "21363"
BASE_PATH = "/"
